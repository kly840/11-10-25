<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="noindex"/>
  <title>Listen đi &gt;&lt;</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css"/>

  <style>
    /* logo top-left (giống index) */
    .logo-top{ position:absolute; top:18px; left:18px; display:inline-block; }
    .logo-top img{
      height:48px; width:auto; opacity:.95;
      transition:transform .12s ease, filter .12s ease;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.08));
    }
    .logo-top:hover img{ transform:scale(1.06); filter: drop-shadow(0 6px 14px rgba(0,0,0,.16)); }

    /* bố cục để nav luôn sát đáy khi nội dung ít */
    .page{ display:flex; flex-direction:column; min-height:75dvh; }
    .spacer{ flex:1 1 auto; }

    /* thẻ audio gọn đẹp */
    .audio-card{
      background:#fff; border-radius:16px; padding:16px;
      box-shadow:var(--shadow, 0 8px 22px rgba(0,0,0,.08));
      margin:14px auto; width:min(780px, 92vw);
    }
    .audio-card h3{ margin:0 0 8px }
    .audio-card audio{ width:100%; margin-top:6px }

    /* hàng ảnh dưới audio */
    .photo-row{
      width:min(980px, 94vw);
      margin:12px auto 0;
      display:grid;
      grid-template-columns: 1fr 1.25fr 1fr; /* giữa to hơn */
      gap:12px;
    }
    .sq{
      position:relative; width:100%; aspect-ratio:1/1; overflow:hidden;
      border-radius:14px; background:rgba(0,0,0,.03);
      box-shadow:none; /* bỏ đổ bóng */
      transition:transform .18s ease;
    }
    .sq:hover{ transform:scale(1.05); } /* hover effect */
    .sq img{
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; object-position:center; display:block; border:0;
    }
    @media (max-width: 720px){
      .photo-row{ grid-template-columns: 1fr; }
    }

    /* bottom nav: 4 nút, căn giữa, sát footer */
    .bottom-nav{
      display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
      margin-top:12px; margin-bottom:4px;
    }
    /* Back Home: trắng chữ đỏ (ghost) */
    .btn-ghost{
      background:#fff; color:var(--accent, #ce2800);
      border:2px solid var(--accent, #ce2800);
    }
  </style>
</head>
<body>
  <!-- logo -->
  <a href="./index.html" class="logo-top" aria-label="Home">
    <img src="./assets/heart_logo.png" alt="logo">
  </a>

  <header>
    <h1>click to listen, naan khungf</h1>
  </header>

  <main class="page">
    <!-- Audio -->
    <section class="audio-card">
      <h3>Happy Birthdayyyy my special one &lt;33</h3>
      <audio controls preload="auto">
        <!-- đúng MIME cho .m4a -->
        <source src="./assets/hbd.m4a" type="audio/mp4">
        <source src="./assets/hbd.m4a" type="audio/x-m4a">
        <!-- (tuỳ chọn) nếu có hbd.mp3, thêm dòng dưới để fallback:
        <source src="./assets/hbd.mp3" type="audio/mpeg">
        -->
        <p>Your browser does not support the audio element.</p>
      </audio>
    </section>

    <!-- 3 ảnh: kly2 giữa to, kly1 & kly3 hai bên nhỏ; 1:1 + hover + no shadow -->
    <section class="photo-row">
      <div class="sq"><img src="./assets/kly1.png" alt="kly1"></div>
      <div class="sq"><img src="./assets/kly2.png" alt="kly2"></div>
      <div class="sq"><img src="./assets/kly3.png" alt="kly3"></div>
    </section>

    <div class="spacer"></div>

    <!-- 4 nút: Back Home (trắng), Blow the Candle, My Letter, Memory -->
    <nav class="bottom-nav">
      <a class="btn btn-ghost" href="./index.html">Back Home</a>
      <a class="btn" href="./birthday-card.html">Blow the Candle</a>
      <a class="btn" href="./quiz.html">My Letter</a>
      <a class="btn" href="./timeline.html">Memory</a>
    </nav>
  </main>

  <footer class="small" style="text-align:center">from kly ♡</footer>
</body>
</html>
