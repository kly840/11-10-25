<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="noindex"/>
  <title>Unlock My Letter^^</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css"/>

  <style>
    /* logo top-left (giống index) */
    .logo-top{ position:absolute; top:18px; left:18px; display:inline-block; }
    .logo-top img{
      height:48px; width:auto; opacity:.95;
      transition:transform .12s ease, filter .12s ease;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.08));
    }
    .logo-top:hover img{ transform:scale(1.06); filter: drop-shadow(0 6px 14px rgba(0,0,0,.16)); }

    /* page layout: để bottom nav xuống cuối khi nội dung ít */
    .page{ display:flex; flex-direction:column; min-height:75dvh; }

    /* lưới 2 cột */
    .quiz-wrap{ display:grid; grid-template-columns:1fr 1fr; gap:28px; margin-top:40px; }
    @media (max-width:900px){ .quiz-wrap{ grid-template-columns:1fr; } }

    /* cột trái: khung câu hỏi */
    .quiz-box{ background:var(--soft); padding:20px 28px; border-radius:12px; box-shadow:var(--shadow); }
    .quiz-box label{ display:block; font-weight:700; margin:12px 0 6px; }
    .quiz-box input{ width:100%; padding:10px 14px; border-radius:12px; border:1px solid rgba(89,2,2,.25); }

    /* dòng “Only opens after the quiz” — đậm + to gấp đôi */
    .callout{ font-weight:800; font-size:clamp(18px,3.2vw,26px); margin:12px 0; }

    /* nút trắng cho “unlock my letter ^^” */
    .btn-white{
      background:#fff; color:var(--accent); border:2px solid var(--accent);
      padding:10px 18px; border-radius:25px; font-weight:700; cursor:pointer;
      transition:background .2s,color .2s; box-shadow:var(--shadow);
    }
    .btn-white:hover{ background:var(--accent); color:#fff; }

    /* ảnh bên phải (không gắn link để không bypass) */
    .right-img{ display:flex; justify-content:center; align-items:center; }
    .right-img img{ max-width:100%; height:auto; border-radius:16px; box-shadow:var(--shadow); }

    /* bottom nav (4 nút), sát footer */
    .spacer{ flex:1 1 auto; }
    .bottom-nav{ display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:12px; margin-bottom:4px; }
    .btn-ghost{
      background:#fff; color:var(--accent);
      border:2px solid var(--accent);
    }
  </style>
</head>
<body>
  <!-- Logo -->
  <a href="./index.html" class="logo-top" aria-label="Home"><img src="./assets/heart_logo.png" alt="logo"></a>

  <header>
    <h1>Heyyyy! Before you read my letter...</h1>
    <p class="callout"><strong>Only opens after the quiz 💡</strong></p>
  </header>

  <main class="page">
    <section class="quiz-wrap">
      <!-- Column 1: quiz + nút unlock (trắng) -->
      <div class="quiz-box">
        <form id="quiz-form" autocomplete="off">
          <!-- ⚠️ Nếu bạn đổi nội dung câu hỏi, đừng quên cập nhật mảng ANSWERS trong JS -->
          <label>1) Longest call we had lasted how many hours?</label>
          <input type="text" name="q1" placeholder="hint: number (just the hours only)" required>

          <label>2) What color or image did you once compare my eyes to?</label>
          <input type="text" name="q2" placeholder="hint: 4-5 words (it's not an actual color)" required>

          <label>3) Which song did you imagine us being in, the one that you came up with?</label>
          <input type="text" name="q3" placeholder="3 words" required>

          <button type="submit" class="btn-white" style="margin-top:16px;">unlock my letter ^^</button>
          <p id="msg" class="small" style="margin-top:6px;"></p>
        </form>
      </div>

      <!-- Column 2: ảnh minh hoạ (không gắn link để bắt buộc qua quiz) -->
      <div class="right-img">
        <img src="./assets/hello_nhan_khungf_letter.png" alt="Hello Nhan khungf">
      </div>
    </section>

    <div class="spacer"></div>

    <!-- Bottom nav: Back Home (trắng), Audio, Blow the Candle, Memory (3 nút sau đỏ) -->
    <nav class="bottom-nav">
      <a class="btn btn-ghost" href="./index.html">Back Home</a>
      <a class="btn" href="./audio.html">Audio</a>
      <a class="btn" href="./birthday-card.html">Blow the Candle</a>
      <a class="btn" href="./timeline.html">Memory</a>
    </nav>
  </main>

  <!-- Footer -->
  <footer class="small" style="text-align:center">from kly ♡</footer>

  <!-- JS: kiểm tra đáp án → tạo token → mở thư -->
  <script>
    // ==== CONFIG: CẬP NHẬT NẾU ĐÃ ĐỔI CÂU HỎI ====
    // Nhập nhiều biến thể đúng cho mỗi câu (không phân biệt hoa/thường, bỏ ký tự thừa)
    const ANSWERS = {
      q1: ["18","18h","18 hours"],  // ví dụ: nếu đổi câu hỏi -> cập nhật mảng này
      q2: ["ocean after a storm","ocean after the storm","the ocean after a storm","the ocean after the storm","ocean after a big storm","ocean after the big storm"],
      q3: ["ong ba anh","ông bà anh"]
    };
    const SALT = "kly840";
    const LETTER_URL = "./letters/letter-1.html";

    // ===== Helpers =====
    function normalize(s){
      return (s||"")
        .toString()
        .trim()
        .toLowerCase()
        .normalize("NFD")                 // bỏ dấu tiếng Việt
        .replace(/\p{Diacritic}/gu,"")   // yêu cầu trình duyệt hỗ trợ Unicode property
        .replace(/[^\p{L}\p{N}]+/gu,""); // bỏ mọi ký tự không phải chữ/số
    }

    function isAllCorrect(formData){
      return Object.keys(ANSWERS).every(key=>{
        const user = normalize(formData.get(key));
        const list = ANSWERS[key] || [];
        return list.some(ok => normalize(ok) === user);
      });
    }

    async function sha256Hex(str){
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
    }

    async function buildCanonicalToken(){
      // Ghép phương án đúng đầu tiên của từng câu (đã normalize) + SALT
      const joined = Object.keys(ANSWERS).map(k => normalize(ANSWERS[k][0])).join("|") + "|" + SALT;
      return sha256Hex(joined);
    }

    // (optional) confetti
    function confetti(){
      for(let i=0;i<70;i++){
        const s=document.createElement('span');
        s.className='confetti';
        s.style.position='fixed'; s.style.top='-10px';
        s.style.width=(6+Math.random()*6)+'px';
        s.style.height=(10+Math.random()*10)+'px';
        s.style.left=Math.random()*100+'vw';
        s.style.background=`hsl(${Math.random()*360}deg 90% 60%)`;
        s.style.opacity='0.9';
        s.style.animation='drop linear forwards';
        s.style.animationDuration=(1.1+Math.random()*0.9)+'s';
        document.body.appendChild(s);
        setTimeout(()=>s.remove(), 1800);
      }
    }
    const style = document.createElement('style');
    style.textContent = '@keyframes drop{to{transform:translateY(120vh) rotate(460deg);opacity:1}}';
    document.head.appendChild(style);

    // ===== Submit handler =====
    const form = document.getElementById('quiz-form');
    const msg  = document.getElementById('msg');

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const data = new FormData(form);

      if(!isAllCorrect(data)){
        msg.textContent = "Nahhh, try again! You don't love me that much🙄";
        return;
      }

      msg.textContent = "Ghê zạ đúng rùi! Unlocking letter… 💖";
      confetti();

      // Tạo token và chuyển trang
      const token = await buildCanonicalToken();
      const url = new URL(LETTER_URL, location.href);
      url.searchParams.set("t", token);
      setTimeout(()=>{ location.href = url.toString(); }, 800);
    });
  </script>
</body>
</html>
