<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="noindex"/>
  <title>blow the candle 🎂</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css"/>

  <style>
    :root{ --bg:#fff5e7; --text:#590202; --accent:#ce2800; }
    body{ background:var(--bg); color:var(--text); margin:0; font:16px/1.6 "Montserrat",ui-sans-serif; }

    /* logo top-left */
    .logo-top{ position:absolute; top:18px; left:18px; display:inline-block; }
    .logo-top img{ height:48px; width:auto; opacity:.95; transition:transform .12s, filter .12s; filter:drop-shadow(0 2px 4px rgba(0,0,0,.08)); }
    .logo-top:hover img{ transform:scale(1.06); filter:drop-shadow(0 6px 14px rgba(0,0,0,.16)); }

    header{ text-align:center; padding-top:48px; }
    h1{ color:var(--accent); margin:0 0 6px; font-size:clamp(28px,4.2vw,44px); }
    .subtitle{ opacity:.9; margin:0 0 22px; }

    /* Sân khấu: ảnh trái – bánh – ảnh phải */
    .stage{
      display:flex; align-items:center; justify-content:center;
      gap:clamp(18px, 6vw, 56px);
      margin:20px auto 16px; width:min(980px, 94vw);
    }

    /* Bánh & nến: tạo stacking-order rõ ràng */
    .cake-wrap{ position:relative; width:clamp(260px, 28vw, 360px); height:180px; }
    .cake-base{
      position:relative; /* để z-index có hiệu lực */
      z-index:2;         /* CAKE ở TRÊN thân nến */
      width:100%; height:120px; margin-top:58px;
      background:#f5d3c7; border-radius:16px; border:2px solid rgba(206,40,0,.18);
    }
    .candle{
      position:absolute; left:50%; transform:translateX(-50%);
      top:8px; width:14px; height:140px; border-radius:7px;
      background:#fff; border:2px solid rgba(206,40,0,.18);
      z-index:1;         /* CANDLE ở DƯỚI cake */
    }
    .flame{
      position:absolute; left:50%; transform:translateX(-50%); top:-10px;
      width:22px; height:34px; border-radius:50% 50% 45% 45%;
      background:radial-gradient(ellipse at 50% 65%, #ffd36c 0%, #ff9c2b 55%, rgba(255,156,43,.0) 66%),
                 radial-gradient(ellipse at 50% 35%, #ffe39c 0%, rgba(255,227,156,.0) 70%);
      animation:flicker .9s infinite ease-in-out;
      cursor:pointer; z-index:3; /* FLAME ở TRÊN hết */
    }
    .flame.off{ display:none; }
    @keyframes flicker{
      0%,100%{ transform:translateX(-50%) scale(1); filter:blur(0px); }
      50%    { transform:translateX(-50%) scale(1.06); filter:blur(.2px); }
    }

    /* Ảnh hai bên: nhỏ hơn bánh một chút, không khung/bóng */
    .side-pic{
      width:clamp(120px, 16vw, 200px);   /* < cake-wrap max 360 → nhỏ hơn bánh */
      aspect-ratio:1/1; overflow:hidden; border-radius:12px;
      background:transparent; border:none; box-shadow:none;
      transition:transform .15s ease;
    }
    .side-pic img{ width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
    .side-pic:hover{ transform:scale(1.06); }

    .wish{ text-align:center; font-weight:700; margin:14px 0 28px; }

    /* Nút cuối trang */
    .bottom-nav{ display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:10px; margin-bottom:4px; }
    .btn{ display:inline-block; background:var(--accent); color:#fff; border:0; padding:10px 18px; border-radius:25px; font-weight:700; text-decoration:none; }
    .btn-ghost{ background:#fff; color:var(--accent); border:2px solid var(--accent); }

    footer{ text-align:center; margin:12px 0 28px; color:#7c3d2f; font-size:13px; }
  </style>
</head>
<body>
  <!-- logo -->
  <a class="logo-top" href="./index.html" aria-label="Home"><img src="./assets/heart_logo.png" alt="logo"></a>

  <header>
    <h1>blow the candle 🎂</h1>
    <p class="subtitle">blow towards your mic… or tap the flame</p>
  </header>

  <!-- Ảnh trái – bánh – ảnh phải -->
  <section class="stage">
    <!-- Trái: kly2 -->
    <figure class="side-pic"><img src="./assets/kly2.png" alt="kly2"></figure>

    <!-- Bánh & nến ở giữa (đã chỉnh layer) -->
    <div class="cake-wrap">
      <div id="flame" class="flame" title="tap to blow"></div>
      <div class="candle"></div>
      <div class="cake-base"></div>
    </div>

    <!-- Phải: nhan1 -->
    <figure class="side-pic"><img src="./assets/nhan1.png" alt="nhan1"></figure>
  </section>

  <p id="wish" class="wish">Happi birthday, my naan 💛 Close your eyes, make a wish, and blow</p>

  <!-- Nav -->
  <nav class="bottom-nav">
    <a class="btn btn-ghost" href="./index.html">Back Home</a>
    <a class="btn" href="./timeline.html">Memory</a>
    <a class="btn" href="./audio.html">Audio</a>
    <a class="btn" href="./quiz.html">My Letter</a>
  </nav>

  <footer>from kly ♡</footer>

  <script>
    const flame = document.getElementById('flame');
    const wish  = document.getElementById('wish');
    function extinguish(){
      if(flame.classList.contains('off')) return;
      flame.classList.add('off');
      wish.textContent = "Yeyyyy my babi, no matter what happened, I’m always be by your side";
    }
    flame.addEventListener('click', extinguish);
    // Nếu có mic-detect, chỉ cần gọi extinguish() khi phát hiện thổi.
  </script>
</body>
</html>
